on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug
        run: |
          echo "Current directory:"
          pwd
          echo "Files:"
          ls -la
          echo "All files:"
          find . -type f

      - name: Run Tests
        run: npm test